<section class="premium-gallery">
  <header class="gallery-header">
    <span class="pre-title">სიზუსტე დეტალებში</span>
    <h1 class="main-title">ჩვენი <span class="gold">ნამუშევრები</span></h1>
    <div class="premium-divider">
      <span class="line"></span>
      <span class="diamond"></span>
      <span class="line"></span>
    </div>
  </header>

  <nav class="filter-bar" aria-label="კატეგორიების ფილტრი">
    <div class="filter-track">
      @for (cat of categories(); track cat) {
      <button class="filter-btn" 
              [class.active]="selectedCategory() === cat" 
              (click)="setCategory(cat)"
              [attr.aria-pressed]="selectedCategory() === cat">
        {{ cat }}
      </button>
      }
    </div>
  </nav>

  @if (productService.isLoading()) {
  <div class="loader-wrapper">
    <div class="custom-spinner" aria-label="მიმდინარეობს ჩატვირთვა"></div>
  </div>
  } @else {
  <div class="gallery-grid">
    @for (item of filteredProducts(); track item.id; let i = $index) {
    <button class="work-card" (click)="openImage(item)" [attr.aria-label]="item.customTitle + ' - სურათის გახსნა'">
      <div class="card-media">
        <img [ngSrc]="item.imageUrl" [alt]="item.customTitle" fill [priority]="i < 2" class="premium-img">

        <div class="card-hover-info">
          <span class="plus" aria-hidden="true">+</span>
          <p>დათვალიერება</p>
        </div>
        <div class="badge">№{{ item.id }}</div>
      </div>
      <div class="card-body">
        <span class="category-tag">{{ item.category }}</span>
        <div class="title-row">
          <h3 class="title">{{ item.customTitle }}</h3>
        </div>
      </div>
    </button>
    }
  </div>
  }
</section>

@if (selectedImage(); as img) {
<div class="fixed-lightbox" (click)="closeImage()" role="dialog" aria-modal="true">
  <div class="lightbox-overlay"></div>
  <button class="close-x" (click)="closeImage()" aria-label="დახურვა">
    <span aria-hidden="true"></span><span aria-hidden="true"></span>
  </button>
  <div class="img-container" (click)="$event.stopPropagation()">
    <div class="img-wrapper">
      <img [src]="img.imageUrl" [alt]="img.customTitle" class="full-img animate-in">
      <div class="img-info-panel">
        <span class="info-category">{{ img.category }}</span>
        <h2 class="info-title">{{ img.customTitle }}</h2>
        <div class="info-line"></div>
      </div>
    </div>
  </div>
</div>
}

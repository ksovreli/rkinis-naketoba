<header class="navbar" [class.scrolled]="isScrolled()">
  <div class="nav-container">

    <!-- Logo -->
    <a class="logo-wrapper" routerLink="/" aria-label="რკინის ნაკეთობა - მთავარი გვერდი">
      <div class="logo-text">
        <span class="brand">რკინის <span class="gold">ნაკეთობა</span></span>
        <span class="sub-brand">Metalwork</span>
      </div>
    </a>

    <!-- Navigation -->
    <nav class="nav-menu" [class.open]="isMenuOpen()">
      <ul class="nav-links">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
            (click)="closeMenu()">მთავარი</a></li>
        <li><a routerLink="/ჩვენი-ნამუშევრები" routerLinkActive="active" (click)="closeMenu()">ჩვენი ნამუშევრები</a>
        </li>
        <li><a routerLink="/ჩვენს-შესახებ" routerLinkActive="active" (click)="closeMenu()">ჩვენს შესახებ</a></li>
        <li><a routerLink="/კონტაქტი" routerLinkActive="active" (click)="closeMenu()">კონტაქტი</a></li>
      </ul>
    </nav>

    <!-- Call to Action (Optional) -->
    <div class="header-actions">
      <button routerLink="/კონტაქტი" class="cta-btn">დაგვიკავშირდით</button>

      <!-- Burger -->
      <button class="burger" (click)="toggleMenu()" [class.active]="isMenuOpen()" [attr.aria-expanded]="isMenuOpen()"
        aria-label="მენიუს გახსნა/დახურვა"> <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

  </div>
</header>
